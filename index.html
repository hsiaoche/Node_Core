<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node_Core // System Root</title>
    
    <link rel="stylesheet" href="./css/main.css">
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <script src="https://unpkg.com/three-spritetext"></script>
</head>
<body>
    <nav id="sys-nav">
        <div class="nav-links">
            <a class="active">NODE_TOPOLOGY</a>
        </div>
        <div>
            <a class="sys-btn" id="btn-export">[ EXPORT_DATA ]</a>
        </div>
    </nav>

    <div id="app-root"></div>

    <template id="tpl-network-view">
        <div id="network-container"></div>
    </template>

    <template id="tpl-edit-modal">
        <div id="edit-modal">
            <div class="modal-content">
                <div class="modal-header">TARGET: <span id="modal-node-name">UNKNOWN</span></div>
                <div style="font-size: 0.8em; color: var(--text-muted); margin-bottom: 10px;">> CURRENT_TRAITS:</div>
                <div class="tag-list" id="modal-tag-list"></div>
                
                <div class="input-group">
                    <input type="text" id="new-trait-input" placeholder="Enter new trait...">
                    <button id="btn-add-trait">ADD</button>
                </div>

                <div class="modal-actions">
                    <button id="btn-cancel">[ CANCEL ]</button>
                    <button id="btn-commit" style="border-color: var(--highlight); color: var(--highlight);">[ COMMIT ]</button>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
