<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Knowledge Graph</title>
    
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/table.css">
    
    <!-- Modern Enterprise Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bulletproof Global Dependencies -->
    <script src="https://unpkg.com/three@0.136.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.6.5/dist/three-spritetext.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
    <!-- Error Display (Debug) -->
    <div id="debug-errors" style="position:fixed; z-index:9999; bottom:0; left:0; background:rgba(255,0,0,0.8); color:white; padding:10px; font-family:monospace; white-space:pre-wrap; width:100%; display:none; max-height: 40vh; overflow-y: auto;"></div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var debugEl = document.getElementById('debug-errors');
            debugEl.style.display = 'block';
            debugEl.innerHTML += 'ERROR: ' + msg + '\\nURL: ' + url + '\\nLine: ' + lineNo + ':' + columnNo + '\\n';
            if (error && error.stack) debugEl.innerHTML += error.stack + '\\n\\n';
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            var debugEl = document.getElementById('debug-errors');
            debugEl.style.display = 'block';
            debugEl.innerHTML += 'UNHANDLED PROMISE REJECTION: ' + (event.reason ? event.reason.stack || event.reason : event) + '\\n\\n';
        });
    </script>
</head>
<body>
    <!-- Top Navbar -->
    <nav id="sys-nav">
        <div class="nav-brand">企業知識圖譜平台</div>
        <div class="nav-links">
            <a href="#" class="active" id="nav-network">知識圖譜</a>
            <a href="#" id="nav-table">表格檢視</a>
        </div>
        <button id="btn-export" class="sys-btn">[ 匯出資料 ]</button>
    </nav>
    
    <!-- Main Workspace -->
    <main id="app-root">
        <!-- 3D Graph Container -->
        <div id="network-container"></div>
        
        <!-- Left Sidebar (Stats & Legend) -->
        <aside id="sidebar-left" class="sys-panel">
            <button id="btn-toggle-sidebar" class="panel-toggle" title="隱藏/顯示側邊欄">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div id="panel-stats">
                <h3>系統統計</h3>
                <div class="stat-item"><span>載入中...</span></div>
            </div>
            
            <div id="panel-legend" style="margin-top: 30px;">
                <h3>圖例</h3>
                <div class="legend-item"><div class="legend-box cat"></div> 分類核心</div>
                <div class="legend-item"><div class="legend-box tag"></div> 特質標籤</div>
                <div class="legend-item"><div class="legend-dot user-admin"></div> 管理員</div>
                <div class="legend-item"><div class="legend-dot user-std"></div> 一般使用者</div>
                
                <h4 style="margin-top:15px; color:var(--text-muted); font-size:0.75em;">關聯類型</h4>
                <div class="legend-item"><div class="legend-line belong"></div> 分類歸屬</div>
                <div class="legend-item"><div class="legend-line has"></div> 擁有標籤</div>
                <div class="legend-item"><div class="legend-line sim"></div> 相似度關聯</div>
            </div>
        </aside>

        <!-- Right Sidebar (Hover Panel) -->
        <aside id="sidebar-right" class="sys-panel right">
            <div id="panel-hover" style="display: none;">
                <!-- Dynamically populated by Interaction.js -->
            </div>
        </aside>
    </main>

    <!-- App Entry -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
