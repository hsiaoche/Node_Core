<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node_Core // System Root</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <script src="https://unpkg.com/three-spritetext"></script>

    <style>
        :root {
            --bg-base: #050505;
            --bg-panel: #111111;
            --text-primary: #e2e8f0;
            --text-muted: #888888;
            --border-subtle: #333333;
            --highlight: #ffffff;
            --danger: #ff4444;

            --font-mono: 'Consolas', 'Courier New', monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont,
                "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;

            display: flex;
            flex-direction: column;

            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);

            -webkit-font-smoothing: antialiased;
        }

        #sys-nav {
            z-index: 100;

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 20px 30px;

            border-bottom: 1px solid var(--border-subtle);
            background: rgba(5, 5, 5, 0.9);

            font-family: var(--font-mono);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        #sys-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85em;
            letter-spacing: 2px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        #sys-nav a:hover,
        #sys-nav a.active {
            color: var(--highlight);
        }

        #sys-nav a.active {
            padding-bottom: 4px;
            border-bottom: 1px solid var(--highlight);
        }

        .sys-btn {
            padding: 4px 12px;
            border: 1px dashed var(--border-subtle);
        }

        .sys-btn:hover {
            border-color: var(--highlight);
            background: rgba(255, 255, 255, 0.05);
        }

        #app-root {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        /* Modal */

        #edit-modal {
            position: fixed;
            inset: 0;
            z-index: 999;

            display: none;
            align-items: center;
            justify-content: center;

            background: rgba(0, 0, 0, 0.85);
        }

        #edit-modal.is-visible {
            display: flex;
        }

        .modal-content {
            position: relative;

            width: min(400px, calc(100% - 40px));
            padding: 30px;

            border: 1px solid var(--border-subtle);
            background: var(--bg-panel);

            font-family: var(--font-mono);
        }

        .modal-content::before {
            content: '';

            position: absolute;
            top: -1px;
            left: -1px;

            width: 10px;
            height: 10px;

            border-top: 2px solid var(--highlight);
            border-left: 2px solid var(--highlight);
        }

        .modal-header {
            margin-bottom: 20px;
            padding-bottom: 10px;

            border-bottom: 1px dashed var(--border-subtle);

            color: var(--highlight);
            font-size: 1.2em;
        }

        .modal-subtitle {
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.8em;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;

            min-height: 30px;
            margin-bottom: 20px;
        }

        .sys-tag {
            display: flex;
            align-items: center;
            gap: 6px;

            padding: 4px 10px;

            background: #222;
            color: var(--text-primary);
            font-size: 0.85em;
        }

        .sys-tag-remove {
            border: 0;
            padding: 0;

            background: transparent;
            color: var(--text-muted);

            font: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        .sys-tag-remove:hover {
            color: var(--danger);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .input-group input {
            flex: 1;

            padding: 8px;

            border: 1px solid var(--border-subtle);
            outline: none;

            background: transparent;
            color: var(--text-primary);

            font-family: var(--font-mono);
        }

        .input-group input:focus {
            border-color: var(--highlight);
        }

        .input-group button {
            padding: 0 15px;

            border: none;

            background: var(--highlight);
            color: #000;

            font-family: var(--font-mono);
            font-weight: bold;
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .modal-actions button {
            padding: 6px 15px;

            border: 1px solid var(--border-subtle);

            background: transparent;
            color: var(--text-muted);

            font-family: var(--font-mono);
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-actions button:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .modal-actions .primary {
            border-color: var(--highlight);
            color: var(--highlight);
        }

        .network-container {
            position: absolute;
            inset: 0;
        }

        .network-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;

            color: #555;
            font-family: var(--font-mono);
        }

        .system-error {
            padding: 30px;
            color: var(--danger);
            font-family: var(--font-mono);
        }
    </style>
</head>

<body>

    <nav id="sys-nav">
        <div class="nav-links">
            <a href="#admin" class="active">NODE_CORE_ADMIN</a>
            <a href="#nodes">NODE_TOPOLOGY</a>
        </div>

        <a href="#" class="sys-btn" id="export-data-btn">
            [ EXPORT_DATA ]
        </a>
    </nav>

    <main id="app-root"></main>

    <div id="edit-modal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true">
            <div class="modal-header">
                TARGET:
                <span id="modal-node-name">SYS_ADMIN</span>
            </div>

            <div class="modal-subtitle">
                &gt; CURRENT_TRAITS:
            </div>

            <div class="tag-list" id="modal-tag-list"></div>

            <div class="input-group">
                <input
                    type="text"
                    id="new-trait-input"
                    placeholder="Enter new trait..."
                    autocomplete="off"
                >

                <button type="button" id="add-trait-btn">
                    ADD
                </button>
            </div>

            <div class="modal-actions">
                <button type="button" id="cancel-modal-btn">
                    [ CANCEL ]
                </button>

                <button type="button" class="primary" id="commit-node-btn">
                    [ COMMIT ]
                </button>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        const STORAGE_KEY = 'v8_node_data';

        const ViewTemplates = Object.freeze({
            admin: `
                <div style="
                    padding: 40px;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    height: 100%;
                ">
                    <div style="
                        width: 100%;
                        max-width: 500px;
                        height: 500px;
                    ">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
            `,

            nodes: `
                <div class="network-container" id="network-container"></div>

                <div class="network-hint">
                    &gt; CLICK to inspect node<br>
                    &gt; DRAG to rotate space
                </div>
            `
        });

        const state = {
            nodes: [],
            editingNodeId: null,
            draftTraits: []
        };

        const runtime = {
            chart: null,
            network: null,
            animationFrameId: null,
            routeRequestId: 0
        };

        const dom = {
            root: document.getElementById('app-root'),
            modal: document.getElementById('edit-modal'),
            modalNodeName: document.getElementById('modal-node-name'),
            modalTagList: document.getElementById('modal-tag-list'),
            traitInput: document.getElementById('new-trait-input'),
            navLinks: document.querySelectorAll('.nav-links a')
        };

        function logError(message, error) {
            console.error(`[SYS_ERROR] ${message}`, error);
        }

        function loadStoredNodes() {
            const rawData = localStorage.getItem(STORAGE_KEY);

            if (!rawData) {
                return null;
            }

            try {
                const parsedData = JSON.parse(rawData);

                if (!Array.isArray(parsedData)) {
                    throw new Error('Stored node data must be an array.');
                }

                return parsedData;
            } catch (error) {
                logError('Invalid localStorage data.', error);
                localStorage.removeItem(STORAGE_KEY);
                return null;
            }
        }

        async function loadNodeData() {
            const storedNodes = loadStoredNodes();

            if (storedNodes) {
                return storedNodes;
            }

            try {
                const response = await fetch('nodes.json');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const nodes = await response.json();

                if (!Array.isArray(nodes)) {
                    throw new Error('nodes.json must contain an array.');
                }

                localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes));

                return nodes;
            } catch (error) {
                console.warn(
                    '[SYS_WARN] nodes.json unavailable. Using fallback data.',
                    error
                );

                const fallbackNodes = [
                    {
                        id: 'SYS_ADMIN',
                        name: 'System Admin',
                        traits: ['邏輯重構', '全局規劃']
                    },
                    {
                        id: 'NODE_01',
                        name: 'Frontend Alpha',
                        traits: ['除錯能力', '邏輯重構'],
                        familiar_with: ['SYS_ADMIN']
                    },
                    {
                        id: 'NODE_02',
                        name: 'Backend Beta',
                        traits: ['國數理解'],
                        familiar_with: ['SYS_ADMIN', 'NODE_01']
                    }
                ];

                localStorage.setItem(
                    STORAGE_KEY,
                    JSON.stringify(fallbackNodes)
                );

                return fallbackNodes;
            }
        }

        function exportData() {
            const blob = new Blob(
                [JSON.stringify(state.nodes, null, 2)],
                { type: 'application/json' }
            );

            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');

            anchor.href = url;
            anchor.download = 'nodes.json';

            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();

            URL.revokeObjectURL(url);
        }

        function destroyChart() {
            if (!runtime.chart) {
                return;
            }

            runtime.chart.destroy();
            runtime.chart = null;
        }

        function stopNetworkAnimation() {
            if (runtime.animationFrameId !== null) {
                cancelAnimationFrame(runtime.animationFrameId);
                runtime.animationFrameId = null;
            }
        }

        function destroyNetwork() {
            stopNetworkAnimation();

            if (runtime.network) {
                runtime.network._destructor?.();
                runtime.network = null;
            }
        }

        function teardownView() {
            destroyChart();
            destroyNetwork();
        }

        async function loadView(hash) {
            const requestId = ++runtime.routeRequestId;

            if (state.nodes.length === 0) {
                state.nodes = await loadNodeData();
            }

            if (requestId !== runtime.routeRequestId) {
                return;
            }

            teardownView();

            const route = hash.replace(/^#/, '') || 'admin';

            dom.root.innerHTML =
                ViewTemplates[route] ??
                `<div class="system-error">[SYS_ERROR] View not found.</div>`;

            dom.navLinks.forEach(link => {
                link.classList.toggle(
                    'active',
                    link.getAttribute('href') === `#${route}`
                );
            });

            if (route === 'admin') {
                renderAdminChart();
            }

            if (route === 'nodes') {
                renderNodeNetwork();
            }
        }

        function renderAdminChart() {
            const canvas = document.getElementById('radarChart');

            if (!canvas) {
                return;
            }

            runtime.chart = new Chart(canvas, {
                type: 'radar',

                data: {
                    labels: [
                        '邏輯重構',
                        '除錯能力',
                        '中二耐性',
                        '社交能耗',
                        '國數理解',
                        '全局規劃'
                    ],

                    datasets: [{
                        data: [95, 100, 60, 10, 90, 85],

                        backgroundColor: 'rgba(255, 255, 255, 0.05)',
                        borderColor: '#ffffff',

                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#0a0a0a',
                        pointBorderWidth: 2,

                        borderWidth: 1.5
                    }]
                },

                options: {
                    responsive: true,
                    maintainAspectRatio: false,

                    scales: {
                        r: {
                            angleLines: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },

                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },

                            pointLabels: {
                                color: '#e2e8f0',
                                font: {
                                    size: 12
                                }
                            },

                            ticks: {
                                display: false,
                                min: 0,
                                max: 100
                            }
                        }
                    },

                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function buildGraphData() {
            const nodes = new Map();
            const links = [];
            const linkKeys = new Set();
            const traitCounts = Object.create(null);

            const addLink = (source, target, type) => {
                const key = `${type}:${source}->${target}`;

                if (linkKeys.has(key)) {
                    return;
                }

                linkKeys.add(key);
                links.push({ source, target });
            };

            state.nodes.forEach(node => {
                nodes.set(node.id, {
                    id: node.id,
                    label: node.name || node.id,
                    group: node.id === 'SYS_ADMIN'
                        ? 'admin'
                        : 'student'
                });
            });

            state.nodes.forEach(node => {
                const traits = Array.isArray(node.traits)
                    ? node.traits
                    : [];

                traits.forEach(trait => {
                    traitCounts[trait] =
                        (traitCounts[trait] || 0) + 1;

                    addLink(
                        node.id,
                        `T_${trait}`,
                        'trait'
                    );
                });

                const familiarWith = Array.isArray(node.familiar_with)
                    ? node.familiar_with
                    : [];

                familiarWith.forEach(targetId => {
                    if (nodes.has(targetId)) {
                        addLink(
                            node.id,
                            targetId,
                            'familiar'
                        );
                    }
                });
            });

            Object.entries(traitCounts).forEach(
                ([trait, count]) => {
                    nodes.set(`T_${trait}`, {
                        id: `T_${trait}`,
                        label: trait,
                        group: 'trait',
                        size: 4 + count * 1.5
                    });
                }
            );

            return {
                nodes: [...nodes.values()],
                links
            };
        }

        function startCameraAnimation() {
            let angle = 0;

            const animate = () => {
                if (!runtime.network) {
                    return;
                }

                runtime.network.cameraPosition({
                    x: 250 * Math.sin(angle),
                    y: 200,
                    z: 250 * Math.cos(angle)
                });

                angle += Math.PI / 2000;

                runtime.animationFrameId =
                    requestAnimationFrame(animate);
            };

            animate();
        }

        function renderNodeNetwork() {
            const container =
                document.getElementById('network-container');

            if (!container || state.nodes.length === 0) {
                return;
            }

            const graphData = buildGraphData();

            try {
                runtime.network = ForceGraph3D()(container)
                    .graphData(graphData)
                    .backgroundColor('#050505')
                    .nodeResolution(32)

                    .nodeColor(node => {
                        switch (node.group) {
                            case 'admin':
                                return '#ffffff';

                            case 'student':
                                return '#cccccc';

                            default:
                                return '#444444';
                        }
                    })

                    .nodeVal(node => {
                        switch (node.group) {
                            case 'admin':
                                return 18;

                            case 'student':
                                return 8;

                            default:
                                return node.size || 3;
                        }
                    })

                    .nodeThreeObjectExtend(true)

                    .nodeThreeObject(node => {
                        const sprite = new SpriteText(
                            node.label || 'Unknown'
                        );

                        sprite.color =
                            node.group === 'admin'
                                ? '#ffffff'
                                : '#aaaaaa';

                        sprite.textHeight =
                            node.group === 'admin'
                                ? 6
                                : 3;

                        sprite.position.y =
                            node.group === 'admin'
                                ? 21
                                : node.group === 'student'
                                    ? 11
                                    : 7;

                        return sprite;
                    })

                    .linkColor(() => 'rgba(255, 255, 255, 0.15)')
                    .linkWidth(1.5)
                    .showNavInfo(false)

                    .onNodeClick(node => {
                        if (node.group !== 'trait') {
                            openModal(node.id);
                        }
                    });

                startCameraAnimation();

            } catch (error) {
                container.innerHTML = `
                    <div class="system-error">
                        [SYS_ERROR] WebGL Engine Failed.
                    </div>
                `;

                logError('Failed to initialize 3D network.', error);
            }
        }

        function openModal(nodeId) {
            const targetNode =
                state.nodes.find(node => node.id === nodeId);

            if (!targetNode) {
                return;
            }

            state.editingNodeId = nodeId;
            state.draftTraits = Array.isArray(targetNode.traits)
                ? [...targetNode.traits]
                : [];

            dom.modalNodeName.textContent =
                targetNode.name || targetNode.id;

            renderModalTags();

            dom.modal.classList.add('is-visible');
            dom.modal.setAttribute('aria-hidden', 'false');

            dom.traitInput.value = '';
            dom.traitInput.focus();
        }

        function closeModal() {
            dom.modal.classList.remove('is-visible');
            dom.modal.setAttribute('aria-hidden', 'true');

            state.editingNodeId = null;
            state.draftTraits = [];

            dom.traitInput.value = '';
        }

        function renderModalTags() {
            dom.modalTagList.replaceChildren();

            state.draftTraits.forEach((trait, index) => {
                const tag = document.createElement('div');
                tag.className = 'sys-tag';

                const label = document.createElement('span');
                label.textContent = trait;

                const removeButton =
                    document.createElement('button');

                removeButton.type = 'button';
                removeButton.className = 'sys-tag-remove';
                removeButton.textContent = '×';
                removeButton.setAttribute(
                    'aria-label',
                    `Remove ${trait}`
                );

                removeButton.addEventListener(
                    'click',
                    () => removeTrait(index)
                );

                tag.append(label, removeButton);
                dom.modalTagList.appendChild(tag);
            });
        }

        function addTrait() {
            const trait = dom.traitInput.value.trim();

            if (!trait || state.draftTraits.includes(trait)) {
                return;
            }

            state.draftTraits.push(trait);

            dom.traitInput.value = '';

            renderModalTags();
            dom.traitInput.focus();
        }

        function removeTrait(index) {
            state.draftTraits.splice(index, 1);
            renderModalTags();
        }

        function saveNodeData() {
            const targetNode = state.nodes.find(
                node => node.id === state.editingNodeId
            );

            if (!targetNode) {
                return;
            }

            targetNode.traits = [...state.draftTraits];

            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify(state.nodes)
            );

            closeModal();

            if (window.location.hash === '#nodes') {
                loadView('#nodes');
            }
        }

        function bindEvents() {
            document
                .getElementById('export-data-btn')
                .addEventListener('click', event => {
                    event.preventDefault();
                    exportData();
                });

            document
                .getElementById('add-trait-btn')
                .addEventListener('click', addTrait);

            document
                .getElementById('cancel-modal-btn')
                .addEventListener('click', closeModal);

            document
                .getElementById('commit-node-btn')
                .addEventListener('click', saveNodeData);

            dom.traitInput.addEventListener(
                'keydown',
                event => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        addTrait();
                    }
                }
            );

            dom.modal.addEventListener(
                'click',
                event => {
                    if (event.target === dom.modal) {
                        closeModal();
                    }
                }
            );

            window.addEventListener(
                'hashchange',
                () => loadView(window.location.hash)
            );

            window.addEventListener(
                'beforeunload',
                teardownView
            );
        }

        async function bootstrap() {
            bindEvents();
            await loadView(window.location.hash);
        }

        bootstrap();
    </script>

</body>
</html>
