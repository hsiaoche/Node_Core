<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node_Core // System Root</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    
    <style>
        :root {
            --bg-base: #050505; /* 更深的純黑底色，凸顯光點 */
            --text-primary: #e2e8f0;
            --text-muted: #888888;
            --border-subtle: #222222;
            --highlight: #ffffff;
            
            --font-mono: 'Consolas', 'Courier New', monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #sys-nav {
            border-bottom: 1px solid var(--border-subtle);
            padding: 20px 30px;
            display: flex;
            gap: 40px;
            background: rgba(5, 5, 5, 0.9);
            font-family: var(--font-mono);
            z-index: 100;
        }

        #sys-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85em;
            letter-spacing: 2px;
            transition: color 0.2s ease;
        }

        #sys-nav a:hover { color: var(--text-primary); }
        #sys-nav a.active { color: var(--highlight); border-bottom: 1px solid var(--highlight); padding-bottom: 4px; }

        #app-root {
            flex: 1;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }
    </style>
</head>
<body>

    <nav id="sys-nav">
        <a href="#admin" class="active">NODE_CORE_ADMIN</a>
        <a href="#nodes">NODE_TOPOLOGY</a>
    </nav>

    <div id="app-root"></div>

    <script>
        const root = document.getElementById('app-root');
        const links = document.querySelectorAll('#sys-nav a');

        async function loadView(hash) {
            const route = hash.replace('#', '') || 'admin';
            const filename = route === 'admin' ? 'view_admin.html' : 'view_nodes.html';

            try {
                const response = await fetch(filename);
                if (!response.ok) throw new Error('Module fetch failed');
                root.innerHTML = await response.text();
                
                links.forEach(link => {
                    link.classList.toggle('active', link.getAttribute('href') === '#' + route);
                });

                setTimeout(() => {
                    if (route === 'admin' && typeof initAdminChart === 'function') initAdminChart();
                    if (route === 'nodes' && typeof initNodeNetwork === 'function') initNodeNetwork();
                }, 50);

            } catch (error) {
                root.innerHTML = `<div style="padding: 30px; font-family: monospace; color: #888;">[SYS_ERROR] Missing module: ${filename}</div>`;
                console.error(error);
            }
        }

        window.addEventListener('hashchange', () => loadView(window.location.hash));
        loadView(window.location.hash);

        window.initAdminChart = function() {
            const canvas = document.getElementById('radarChart');
            if (!canvas) return;
            
            Chart.defaults.color = '#888';
            Chart.defaults.font.family = "'Inter', sans-serif";

            new Chart(canvas.getContext('2d'), {
                type: 'radar',
                data: {
                    labels: ['邏輯重構', '除錯能力', '中二耐性', '社交能耗', '國數理解', '全局規劃'],
                    datasets: [{
                        data: [95, 100, 60, 10, 90, 85],
                        backgroundColor: 'rgba(255, 255, 255, 0.05)',
                        borderColor: '#ffffff',
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#0a0a0a',
                        pointBorderWidth: 2,
                        pointHoverBackgroundColor: '#0a0a0a',
                        pointHoverBorderColor: '#ffffff',
                        borderWidth: 1.5,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: { color: '#e2e8f0', font: { size: 12 } },
                            ticks: { display: false, min: 0, max: 100 }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        };

        window.initNodeNetwork = async function() {
            const container = document.getElementById('network-container');
            if (!container) return;

            try {
                const res = await fetch('nodes.json');
                const rawData = await res.json();

                const nodesArray = [];
                const edgesArray = [];
                const traitCounts = {};

                rawData.forEach(student => {
                    nodesArray.push({ id: student.id, label: student.name, group: 'student' });

                    if(student.traits) {
                        student.traits.forEach(t => {
                            traitCounts[t] = (traitCounts[t] || 0) + 1;
                            edgesArray.push({ from: student.id, to: 'T_' + t });
                        });
                    }

                    if(student.familiar_with) {
                        student.familiar_with.forEach(target => {
                            edgesArray.push({ from: student.id, to: target, dashes: true, width: 1.5, color: 'rgba(255,255,255,0.3)' });
                        });
                    }
                });

                Object.keys(traitCounts).forEach(t => {
                    const count = traitCounts[t];
                    // 微縮化特徵節點，僅依靠亮度區分
                    const dynamicSize = 4 + (count * 1.5);
                    nodesArray.push({ id: 'T_' + t, label: t, group: 'trait', size: dynamicSize });
                });

                const data = { nodes: new vis.DataSet(nodesArray), edges: new vis.DataSet(edgesArray) };

                const options = {
                    nodes: {
                        shape: "dot",
                        borderWidth: 0, // 拔除所有外框，營造純粹的光點感
                        font: { face: "Inter, sans-serif", size: 10, vadjust: -12, color: "#555" } // 標籤文字大幅調暗，避免破壞幾何圖形
                    },
                    groups: {
                        student: { 
                            size: 8, // 縮小學生節點
                            color: { background: "#ffffff" }
                        },
                        trait: { 
                            color: { background: "#666666" },
                            font: { color: "#333333" } // 特徵文字極度低調
                        }
                    },
                    edges: { 
                        color: "rgba(255, 255, 255, 0.15)", // 細緻且高透明度的直線
                        width: 1, 
                        smooth: false // 關鍵設定：強制關閉貝茲曲線，改為幾何直線
                    },
                    physics: { 
                        // 拉長距離，讓節點分佈更像星系散佈
                        forceAtlas2Based: { gravitationalConstant: -120, centralGravity: 0.005, springLength: 150 }, 
                        solver: "forceAtlas2Based", 
                        timestep: 0.3 
                    }
                };

                new vis.Network(container, data, options);
            } catch (err) {
                container.innerHTML = `<div style="padding:30px; font-family:monospace; color:#888;">[SYS_ERROR] Failed to parse JSON data.</div>`;
                console.error(err);
            }
        };
    </script>
</body>
</html>
