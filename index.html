<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V8 // System Root</title>
    
    <!-- 預先載入共用函式庫，避免切換視圖時重複 Request -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    
    <style>
        /* 黑白簡約全域變數 */
        :root {
            --bg-color: #050505;
            --fg-color: #e0e0e0;
            --border-color: #333333;
            --highlight: #ffffff;
            --dim: #666666;
        }

        body {
            background-color: var(--bg-color);
            color: var(--fg-color);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* 防止主畫面出現滾動條 */
        }

        /* 系統導覽列 */
        #sys-nav {
            border-bottom: 1px solid var(--border-color);
            padding: 15px 25px;
            display: flex;
            gap: 30px;
            background: #0a0a0a;
            z-index: 100;
        }

        #sys-nav a {
            color: var(--dim);
            text-decoration: none;
            font-size: 0.9em;
            letter-spacing: 2px;
            transition: color 0.2s;
        }

        #sys-nav a:hover {
            color: var(--fg-color);
        }

        #sys-nav a.active {
            color: var(--highlight);
            font-weight: bold;
            border-bottom: 2px solid var(--highlight);
            padding-bottom: 5px;
        }

        /* 視圖載入區 (View Container) */
        #app-root {
            flex: 1;
            position: relative;
            overflow-y: auto; /* 允許內部內容滾動 */
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body>

    <nav id="sys-nav">
        <a href="#admin" class="active">[ SYS_ADMIN_UNIT ]</a>
        <a href="#nodes">[ NODE_TOPOLOGY ]</a>
    </nav>

    <!-- 所有的 view_*.html 內容都會被動態注入到這裡 -->
    <div id="app-root"></div>

    <script>
        const root = document.getElementById('app-root');
        const links = document.querySelectorAll('#sys-nav a');

        // 核心路由引擎 (Router Engine)
        async function loadView(hash) {
            // 解析目標路由，預設為 admin
            const route = hash.replace('#', '') || 'admin';
            const filename = route === 'admin' ? 'view_admin.html' : 'view_nodes.html';

            try {
                // 非同步讀取 HTML 模板
                const response = await fetch(filename);
                if (!response.ok) throw new Error('Module fetch failed');
                const htmlTemplate = await response.text();
                
                // 注入 DOM Tree
                root.innerHTML = htmlTemplate;

                // 更新導覽列 Active 狀態
                links.forEach(link => {
                    if (link.getAttribute('href') === '#' + route) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });

                // --- [ 注意：這裡存在一個底層執行的盲點 ] ---
                // 透過 innerHTML 注入的 <script> 標籤，瀏覽器基於安全性考量不會執行。
                // 必須在此處手動呼叫初始化函式
                if (route === 'admin' && typeof initAdminChart === 'function') initAdminChart();
                if (route === 'nodes' && typeof initNodeNetwork === 'function') initNodeNetwork();

            } catch (error) {
                root.innerHTML = `<div style="padding: 20px; color: #ff3333;">[SYS_ERROR] Missing module: ${filename}</div>`;
                console.error(error);
            }
        }

        // 監聽網址 Hash 變化 (攔截上一頁/下一頁與點擊)
        window.addEventListener('hashchange', () => loadView(window.location.hash));
        
        // 系統啟動，載入初始畫面
        loadView(window.location.hash);
    </script>
</body>
</html>
